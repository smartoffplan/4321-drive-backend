steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$_PROJECTID/$_SERVICE:$COMMIT_SHA', '.']

  # 2. Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$_PROJECTID/$_SERVICE:$COMMIT_SHA']

  # 3. Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE'
      - '--image'
      - 'gcr.io/$_PROJECTID/$_SERVICE:$COMMIT_SHA'
      - '--region'
      - '$_REGION'
      - '--allow-unauthenticated'
      - '--platform'
      - 'managed'
      - '--update-env-vars'
      - 'NODE_ENV=production'

# Standard Substitutions (must begin with _ and use ONLY uppercase/numbers)
substitutions:
  _SERVICE: '4321-drive-backend'
  _REGION: 'us-central1'
  _PROJECTID: 'YOUR_PROJECT_ID_GOES_HERE'

options:
  logging: CLOUD_LOGGING_ONLY
